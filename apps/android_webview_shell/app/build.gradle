plugins {
  id("com.android.application")
}

android {
  namespace "com.example.mcpshell"
  compileSdk 35

  defaultConfig {
    applicationId "com.example.mcpshell"
    minSdk 26
    targetSdk 35
    versionCode 1
    versionName "0.1.0"

    def flutterWebUrl = project.findProperty("flutterWebUrl") ?: "http://10.0.2.2:8088"
    buildConfigField "String", "FLUTTER_WEB_URL", "\"${flutterWebUrl}\""
  }

  buildTypes {
    release {
      minifyEnabled false
      proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
    }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  buildFeatures {
    buildConfig true
  }
}

dependencies {
  implementation "androidx.appcompat:appcompat:1.7.0"
  implementation "androidx.webkit:webkit:1.12.1"
  implementation "com.google.android.material:material:1.12.0"
}

