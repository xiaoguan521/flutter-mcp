name: flutter_mcp_studio
description: Configurable MCP-driven Flutter UI studio with persisted JSON pages.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_mcp: ^1.0.5
  flutter_mcp_ui_core: ^0.2.3
  flutter_mcp_ui_runtime: ^0.2.5
  hive_flutter: ^1.1.0
  http: ^1.6.0
  provider: ^6.1.5+1
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/samples/

